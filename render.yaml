services:
  - type: web
    name: restaurant-pos-old-backend
    env: node
    plan: free
    buildCommand: npm install && npm run seed
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_FILE
        value: /data/restaurant.db
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://YOUR-NETLIFY-SITE.netlify.app
    disk:
      name: restaurant-pos-data
      mountPath: /data
      sizeGB: 1
